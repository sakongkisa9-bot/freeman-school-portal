<div class="container mt-4">
    <h3>Enter Marks: {{ subject }} ({{ grade }})</h3>

    <div class="mb-3">
        <input type="text" id="studentSearch" class="form-control"
            placeholder="🔍 Search student name or admission number...">
    </div>

    <form method="POST">
        <table class="table table-hover" id="marksTable">
            <thead>
                <tr>
                    <th>ADM NO</th>
                    <th>Student Name</th>
                    <th>Score ({{ subject }})</th>
                </tr>
            </thead>
            <tbody>
                {% for s in students %}
                <tr class="student-row">
                    <td>{{ s.adm_no }}</td>
                    <td class="student-name">{{ s.student_name }}</td>
                    <td>
                        <input type="number" name="score_{{ s.adm_no }}" value="{{ marks_map.get(s.adm_no, '') }}"
                            class="form-control" style="width: 100px;">
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <button type="submit" class="btn btn-primary">Save All Marks</button>
    </form>
</div>

<script>
    document.getElementById('studentSearch').addEventListener('keyup', function () {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('.student-row');

        rows.forEach(row => {
            let name = row.querySelector('.student-name').textContent.toLowerCase();
            let adm = row.cells[0].textContent.toLowerCase();
            if (name.includes(filter) || adm.includes(filter)) {
                row.style.display = "";
            } else {
                row.style.display = "none";
            }
        });
    });
</script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Select Subject - {{ grade }} - Freeman Portal</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #020617;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            opacity: 0.7;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        .page-title {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -1.5px;
            margin-bottom: 10px;
        }

        .highlight {
            color: #10b981;
        }

        .subtitle {
            color: #94a3b8;
            font-size: clamp(14px, 2.5vw, 16px);
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 10px;
            margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .subjects-grid {
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 16px;
                padding: 5px;
            }
        }

        .subject-card {
            background: #0f172a;
            border: 2px solid #1e293b;
            border-radius: 20px;
            padding: 30px 24px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            border-color: #10b981;
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.2);
        }

        .subject-icon {
            font-size: 32px;
            margin-bottom: 12px;
        }

        .subject-name {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .back-container {
            text-align: center;
            margin-top: 30px;
        }

        .btn-back {
            display: inline-block;
            background: transparent;
            color: #64748b;
            border: 2px solid #334155;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-back:hover {
            background: #334155;
            color: #f8fafc;
            border-color: #475569;
        }

        @media (max-width: 480px) {
            .container {
                padding: 15px;
            }

            .header-section {
                padding: 20px 15px;
                margin-bottom: 30px;
            }

            .subject-card {
                padding: 24px 20px;
                min-height: 100px;
            }

            .subject-icon {
                font-size: 28px;
                margin-bottom: 10px;
            }

            .subject-name {
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <div class="container">
        <div class="header-section">
            <h1 class="page-title">Select Subject for <span class="highlight">{{ grade }}</span></h1>
            <p class="subtitle">Which subject's marks would you like to enter?</p>
        </div>

        <div class="subjects-grid">
            {% for sub in subjects %}
            <a href="{{ url_for('enter_marks', grade=grade, subject=sub|urlencode) }}" class="subject-card">
                <div class="subject-icon">📖</div>
                <div class="subject-name">{{ sub }}</div>
            </a>
            {% endfor %}
        </div>

        <div class="back-container">
            <a href="{{ url_for('dashboard') }}" class="btn-back">← Back to Dashboard</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.4,
                    vy: (Math.random() - 0.5) * 0.4,
                    size: 2.5
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(16, 185, 129, 0.6)";
            ctx.strokeStyle = "rgba(16, 185, 129, 0.3)";
            ctx.lineWidth = 1.5;

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                particles.forEach(p2 => {
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 120) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', init);
    </script>
</body>

</html>

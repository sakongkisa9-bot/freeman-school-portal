{% extends "cloud_base.html" %} {% block content %}
<div class="container mt-5 text-center">
    <h2>Select Subject for {{ grade }}</h2>
    <p class="text-muted">Which subject's marks would you like to enter?</p>
    <hr>
    <div class="row justify-content-center">
        {% for sub in subjects %}
        <div class="col-md-3 mb-3">
            <a href="{{ url_for('enter_marks', grade=grade, subject=sub) }}"
                class="btn btn-outline-primary btn-lg w-100 py-3 shadow-sm">
                {{ sub }}
            </a>
        </div>
        {% endfor %}
    </div>
    <div class="mt-4">
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
    </div>
</div>
{% endblock %}

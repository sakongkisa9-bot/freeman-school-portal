{% extends 'cloud_base.html' %}
{% block content %}
<div class="card">
    <h1>School Registration</h1>
    <div id="dev-auth-section">
        <label for="dev_key">Developer Access Password</label>
        <input type="password" id="dev_key" placeholder="Enter Developer Key to Unlock">
        <button class="button" onclick="unlockForm()">Unlock Registration</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 10px;">Invalid Developer Key</p>
    </div>
    <p>Register your school and create the first teacher account. This will also create the portal credentials for your
        teachers.</p>
    <form id="registration-form" method="post"
        style="display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px;">
        <input type="hidden" name="master_key" id="hidden_master_key">

        <label for="school_name">School Name</label>
        <input id="school_name" name="school_name" placeholder="Example: Freeman High School" required>

        <label for="school_code">School Code</label>
        <input id="school_code" name="school_code" placeholder="example: freeman" required>

        <label for="email">School Email</label>
        <input id="email" name="email" type="email" placeholder="admin@school.org">

        <label for="teacher_email">Teacher Email</label>
        <input id="teacher_email" name="teacher_email" type="email" placeholder="teacher@example.com">

        <label for="username">Teacher Username</label>
        <input id="username" name="username" placeholder="example: teacher1" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Choose a strong password" required>

        <button class="button" type="submit">Register School</button>
    </form>
</div>
<script>
    function unlockForm() {
        const key = document.getElementById('dev_key').value;
        const correctKey = "{{ admin_key }}"; // This pulls from Python

        if (key === correctKey) {
            document.getElementById('dev-auth-section').style.display = 'none';
            document.getElementById('registration-form').style.display = 'block';
            document.getElementById('hidden_master_key').value = key;
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }
</script>
{% endblock %}

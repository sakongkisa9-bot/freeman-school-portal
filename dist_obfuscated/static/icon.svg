<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="metallicGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4682B4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4682B4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="#808080" stroke-width="8"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="#A0A0A0" stroke-width="4"/>
  
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="195" fill="#404040" stroke="url(#metallicGradient)" stroke-width="6"/>
  
  <!-- Circuit pattern -->
  <line x1="330" y1="130" x2="400" y2="180" stroke="#4682B4" stroke-width="4"/>
  <circle cx="400" cy="180" r="6" fill="#4682B4"/>
  <line x1="330" y1="150" x2="390" y2="200" stroke="#4682B4" stroke-width="4"/>
  <circle cx="390" cy="200" r="6" fill="#4682B4"/>
  <line x1="330" y1="170" x2="380" y2="220" stroke="#4682B4" stroke-width="4"/>
  <circle cx="380" cy="220" r="6" fill="#4682B4"/>
  
  <!-- Text "ia" -->
  <text x="256" y="320" font-family="Arial, sans-serif" font-size="200" font-weight="bold" 
        text-anchor="middle" fill="url(#metallicGradient)">ia</text>
  
  <!-- Glossy effect -->
  <ellipse cx="180" cy="180" rx="120" ry="120" fill="white" opacity="0.15"/>
</svg>